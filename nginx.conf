# =============================================================================
# Photo Gallery - Nginx Configuration
# =============================================================================
# Разместите этот файл: /etc/nginx/sites-available/photo-gallery
# Активируйте: sudo ln -s /etc/nginx/sites-available/photo-gallery /etc/nginx/sites-enabled/
# Перезапустите: sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

#.Upstream для Next.js приложения
upstream photo_gallery {
    server 127.0.0.1:3000;
    keepalive 64;
}

# HTTP -> HTTPS редирект
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;
    
    # Редирект на HTTPS
    return 301 https://$server_name$request_uri;
}

# Основной HTTPS сервер
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com www.your-domain.com;

    # ==========================================================================
    # SSL Конфигурация (Let's Encrypt)
    # ==========================================================================
    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    
    # Современные настройки SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # HSTS (опционально, для большей безопасности)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ==========================================================================
    # Логи
    # ==========================================================================
    access_log /var/log/nginx/photo-gallery.access.log;
    error_log /var/log/nginx/photo-gallery.error.log;

    # ==========================================================================
    # Gzip сжатие
    # ==========================================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
    gzip_min_length 1000;

    # ==========================================================================
    # Корневая директория (для статических файлов)
    # ==========================================================================
    root /var/www/apps/photo-gallery/public;
    
    # ==========================================================================
    # Статические файлы Next.js с кэшированием
    # ==========================================================================
    
    # Next.js статика (_next/static/)
    location /_next/static/ {
        alias /var/www/apps/photo-gallery/.next/static/;
        expires 365d;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    
    # Изображения из public папки
    location /demo-photos/ {
        alias /var/www/apps/photo-gallery/public/demo-photos/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000";
        
        # Поддержка WebP
        add_header Vary Accept;
    }
    
    # Общие статические файлы
    location ~* \.(jpg|jpeg|png|gif|webp|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000";
    }
    
    # ==========================================================================
    # API маршруты
    # ==========================================================================
    location /api/ {
        proxy_pass http://photo_gallery;
        proxy_http_version 1.1;
        
        # Заголовки
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Таймауты для больших файлов
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
        send_timeout 300;
        
        # Буферизация
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # ==========================================================================
    # Основной proxy для Next.js
    # ==========================================================================
    location / {
        proxy_pass http://photo_gallery;
        proxy_http_version 1.1;
        
        # WebSocket поддержка (для Hot Reload в development)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
        
        # Стандартные заголовки
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Таймауты
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Буферы
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # ==========================================================================
    # Безопасность
    # ==========================================================================
    
    # Скрыть версию Nginx
    server_tokens off;
    
    # Защита от больших запросов
    client_max_body_size 50M;
    client_body_buffer_size 128k;
    
    # Запретить доступ к скрытым файлам
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Запретить доступ к файлам окружения
    location ~ /\.env {
        deny all;
        access_log off;
        log_not_found off;
    }
}

