<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Outer frame body -->
  <rect x="1" y="1" width="30" height="30" rx="3" ry="3" fill="#2d2520"/>
  <!-- Frame top rail -->
  <rect x="1" y="1" width="30" height="5" rx="3" ry="3" fill="#3d3028"/>
  <!-- Frame bottom rail -->
  <rect x="1" y="26" width="30" height="5" rx="3" ry="3" fill="#3d3028"/>
  <!-- Frame left rail -->
  <rect x="1" y="1" width="5" height="30" rx="3" ry="3" fill="#3d3028"/>
  <!-- Frame right rail -->
  <rect x="26" y="1" width="5" height="30" rx="3" ry="3" fill="#3d3028"/>
  <!-- Mat / inner opening (warm off-white) -->
  <rect x="6" y="6" width="20" height="20" rx="1" ry="1" fill="#f5f0e8"/>
  <!-- Sky area inside mat -->
  <rect x="6" y="6" width="20" height="12" rx="1" ry="1" fill="#dce8f0"/>
  <!-- Sun -->
  <circle cx="22" cy="11" r="2.5" fill="#f5c842"/>
  <!-- Mountain silhouette -->
  <polygon points="6,18 13,10 20,18" fill="#8ba89c"/>
  <!-- Second smaller mountain -->
  <polygon points="14,18 20,12 26,18" fill="#6b8c80"/>
  <!-- Ground strip -->
  <rect x="6" y="18" width="20" height="8" fill="#c8b89a"/>
</svg>
